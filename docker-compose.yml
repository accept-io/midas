services:
  postgres:
    image: postgres:16-alpine
    container_name: midas-postgres
    environment:
      POSTGRES_DB: midas
      POSTGRES_USER: midas
      POSTGRES_PASSWORD: midas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "midas"]
      interval: 5s
      timeout: 2s
      retries: 5

  midas:
    build: .
    container_name: midas-app
    ports:
      - "8080:8080"
    # No container-internal healthcheck: the runtime image is distroless and
    # does not contain wget, curl, or /bin/sh. Use GET /readyz from an external
    # orchestrator (Kubernetes readinessProbe, load-balancer health check, etc.).
