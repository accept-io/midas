services:
  postgres:
    image: postgres:16-alpine
    container_name: midas-postgres
    environment:
      POSTGRES_DB: midas
      POSTGRES_USER: midas
      POSTGRES_PASSWORD: midas
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "midas"]
      interval: 5s
      timeout: 2s
      retries: 5

  midas:
    build: .
    container_name: midas-app
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      MIDAS_STORE_BACKEND: postgres
      DATABASE_URL: postgres://midas:midas@postgres:5432/midas?sslmode=disable
      # Explorer login: admin / admin (forced password change on first run).
      # Set MIDAS_LOCAL_IAM_ENABLED=false for headless/API-only deployments.
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/readyz"]
      interval: 10s
      timeout: 2s
      retries: 3
