openapi: "3.1.0"
info:
  title: MIDAS API
  version: "1.0.0"
  description: >
    Authority governance engine for autonomous decisions.
    Every evaluation produces exactly one outcome and one tamper-evident audit envelope.
servers:
  - url: http://localhost:8080
    description: Local development

security:
  - BearerAuth: []

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      description: >
        Static bearer token. Configured via MIDAS_AUTH_TOKENS or midas.yaml auth.tokens.
        Not required when auth.mode=open (development only).

  schemas:
    Error:
      type: object
      required: [error]
      properties:
        error:
          type: string

    Consequence:
      type: object
      required: [type]
      properties:
        type:
          type: string
          enum: [monetary, risk_rating]
        amount:
          type: number
          description: Monetary amount. Required when type=monetary.
        currency:
          type: string
          description: ISO 4217 currency code. Required when type=monetary.
        risk_rating:
          type: string
          enum: [low, medium, high, critical]
          description: Risk rating value. Required when type=risk_rating.

    EvaluateRequest:
      type: object
      required: [surface_id, agent_id, confidence]
      properties:
        surface_id:
          type: string
          description: ID of the governed decision surface.
        agent_id:
          type: string
          description: ID of the acting agent.
        confidence:
          type: number
          format: float
          minimum: 0
          maximum: 1
          description: Agent's confidence in the decision (0.0–1.0).
        consequence:
          $ref: "#/components/schemas/Consequence"
        context:
          type: object
          additionalProperties: true
          description: Key-value pairs satisfying the surface's required context keys.
        request_id:
          type: string
          description: Caller-supplied idempotency key. Auto-generated if omitted.
        request_source:
          type: string
          description: Logical source system identifier. Defaults to "api".
        process_id:
          type: string
          description: |
            Process ID for evaluation. Required in enforced structural mode;
            optional in permissive mode (the default).

            MIDAS validates that the process exists, that the surface exists
            (latest version), and that the surface belongs to this process.
            The request fails with 400 if any validation fails.

    EvaluateResponse:
      type: object
      required: [outcome, reason]
      properties:
        outcome:
          type: string
          enum: [execute, escalate, reject, request_clarification]
        reason:
          type: string
          description: Typed reason code (e.g. WITHIN_AUTHORITY, CONFIDENCE_BELOW_THRESHOLD).
        envelope_id:
          type: string
          description: ID of the persisted governance envelope. Omitted on simulation.
        explanation:
          type: string
          description: Human-readable explanation of the outcome.
        policy_mode:
          type: string
          description: Active policy evaluator mode (e.g. noop).
        policy_reference:
          type: string
          description: Policy bundle reference used during evaluation.
        policy_skipped:
          type: boolean
          description: True when no policy was attached to the profile.
        simulated:
          type: boolean
          description: True when the result was produced by the non-persistent simulate path.

    ReviewRequest:
      type: object
      required: [envelope_id, decision, reviewer]
      properties:
        envelope_id:
          type: string
        decision:
          type: string
          enum: [approve, reject]
        reviewer:
          type: string
          description: Reviewer identifier.
        notes:
          type: string

    ReviewResponse:
      type: object
      required: [envelope_id, status]
      properties:
        envelope_id:
          type: string
        status:
          type: string

    ResolvedProcessSnapshot:
      type: object
      description: >
        Point-in-time snapshot of the Process the resolved Surface belonged
        to at evaluation time. Captured as evidence on the envelope per
        ADR-0001; not derived from live joins after the envelope is written.
      properties:
        id:
          type: string
        origin:
          type: string
          description: Always "manual" in v1.
        managed:
          type: boolean
        replaces:
          type: string
          description: ID of a previously-superseded Process; empty string when none.
        status:
          type: string
          enum: [active, deprecated]

    ResolvedBusinessServiceSnapshot:
      type: object
      description: >
        Point-in-time snapshot of the BusinessService that owned the
        resolved Process at evaluation time. See ADR-0001.
      properties:
        id:
          type: string
        origin:
          type: string
        managed:
          type: boolean
        replaces:
          type: string
        status:
          type: string
          enum: [active, deprecated]

    ResolvedCapabilitySnapshot:
      type: object
      description: >
        Point-in-time snapshot of one Capability in the BusinessService's
        enabling set at evaluation time. The set as a whole is captured
        as a JSONB array on the envelope; individual entries retain the
        historical Capability ID even if the live row is later renamed
        or deleted.
      properties:
        id:
          type: string
        name:
          type: string
        origin:
          type: string
        managed:
          type: boolean
        replaces:
          type: string
        status:
          type: string
          enum: [active, deprecated]

    ResolvedStructure:
      type: object
      description: >
        Service-led structural context resolved at evaluation time:
        the Process the Surface belongs to, the BusinessService that owns
        the Process, and the set of Capabilities enabling the
        BusinessService at the moment the decision was recorded.
        Empty enabling_capabilities arrays are valid and are serialised
        as `[]` (never `null`). Per ADR-0001.
      properties:
        process:
          $ref: "#/components/schemas/ResolvedProcessSnapshot"
        business_service:
          $ref: "#/components/schemas/ResolvedBusinessServiceSnapshot"
        enabling_capabilities:
          type: array
          items:
            $ref: "#/components/schemas/ResolvedCapabilitySnapshot"
          description: >
            Capabilities enabling this BusinessService at evaluation time,
            sorted by id ascending for deterministic byte-level evidence.

    Envelope:
      type: object
      description: Tamper-evident governance record for a single evaluation.
      properties:
        id:
          type: string
        state:
          type: string
          enum: [received, evaluating, outcome_recorded, escalated, awaiting_review, closed]
        surface_id:
          type: string
        agent_id:
          type: string
        request_id:
          type: string
        request_source:
          type: string
        confidence:
          type: number
        outcome:
          type: string
        reason_code:
          type: string
        explanation:
          type: string
        profile_id:
          type: string
        grant_id:
          type: string
        surface_version:
          type: integer
        first_event_hash:
          type: string
        final_event_hash:
          type: string
        resolved:
          type: object
          description: >
            Resolved facts captured at evaluation time. Currently exposes
            the service-led structural context added by ADR-0001; existing
            authority-chain fields remain at the top level for backwards
            compatibility.
          properties:
            structure:
              $ref: "#/components/schemas/ResolvedStructure"
        created_at:
          type: string
          format: date-time
        closed_at:
          type: string
          format: date-time

    Surface:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        status:
          type: string
          enum: [draft, review, active, deprecated, retired]
        version:
          type: integer
        domain:
          type: string
        business_owner:
          type: string
        technical_owner:
          type: string
        effective_from:
          type: string
          format: date-time
        approved_by:
          type: string
        approved_at:
          type: string
          format: date-time
        deprecation_reason:
          type: string
        successor_surface_id:
          type: string

    Profile:
      type: object
      properties:
        id:
          type: string
        version:
          type: integer
        surface_id:
          type: string
        name:
          type: string
        description:
          type: string
        status:
          type: string
          enum: [draft, review, active, deprecated, retired]
        effective_date:
          type: string
          format: date-time
        confidence_threshold:
          type: number
        escalation_mode:
          type: string
          enum: [auto, manual]
        fail_mode:
          type: string
          enum: [open, closed]
        policy_reference:
          type: string
        required_context_keys:
          type: array
          items:
            type: string
        approved_by:
          type: string
        approved_at:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Agent:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
          enum: [ai, service, operator]
        owner:
          type: string
        model_version:
          type: string
        endpoint:
          type: string
        operational_state:
          type: string
          enum: [active, suspended, revoked]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Grant:
      type: object
      properties:
        id:
          type: string
        agent_id:
          type: string
        profile_id:
          type: string
        status:
          type: string
          enum: [active, suspended, revoked, expired]
        granted_by:
          type: string
        effective_from:
          type: string
          format: date-time
        effective_until:
          type: string
          format: date-time
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ApproveSurfaceRequest:
      type: object
      required: [approver_id]
      properties:
        approver_id:
          type: string
        approver_name:
          type: string
        submitted_by:
          type: string
          description: ID of the principal who submitted the surface for review.

    DeprecateSurfaceRequest:
      type: object
      required: [deprecated_by, reason]
      properties:
        deprecated_by:
          type: string
        reason:
          type: string
        successor_id:
          type: string
          description: Optional successor surface ID.

    ApproveProfileRequest:
      type: object
      required: [version, approved_by]
      properties:
        version:
          type: integer
          minimum: 1
        approved_by:
          type: string

    DeprecateProfileRequest:
      type: object
      required: [version, deprecated_by]
      properties:
        version:
          type: integer
          minimum: 1
        deprecated_by:
          type: string

    GrantLifecycleRequest:
      type: object
      properties:
        suspended_by:
          type: string
          description: Required for suspend action.
        revoked_by:
          type: string
          description: Required for revoke action.
        reinstated_by:
          type: string
          description: Required for reinstate action.
        reason:
          type: string

    GrantLifecycleResponse:
      type: object
      required: [grant_id, status, agent_id]
      properties:
        grant_id:
          type: string
        status:
          type: string
          enum: [active, suspended, revoked]
        agent_id:
          type: string

    Capability:
      type: object
      properties:
        id:
          type: string
          description: Unique capability identifier.
        name:
          type: string
          description: Human-readable capability name.
        description:
          type: string
          description: Optional description. Omitted when empty.
        status:
          type: string
          enum: [active, inactive, deprecated]
        owner:
          type: string
          description: Owner identifier. Omitted when not set.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    Process:
      type: object
      properties:
        id:
          type: string
          description: Unique process identifier.
        name:
          type: string
          description: Human-readable process name.
        capability_id:
          type: string
          description: ID of the parent capability.
        description:
          type: string
          description: Optional description. Omitted when empty.
        status:
          type: string
          enum: [active, inactive, deprecated]
        owner:
          type: string
          description: Owner identifier. Omitted when not set.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    BusinessService:
      type: object
      description: >
        A business service grouping for processes (V2 structural layer).
        Mirrors the businessServiceResponse wire format.
      properties:
        id:
          type: string
          description: Unique business service identifier.
        name:
          type: string
          description: Human-readable business service name.
        description:
          type: string
          description: Optional description. Omitted when empty.
        service_type:
          type: string
          description: Service classification (e.g. customer_facing, internal).
        regulatory_scope:
          type: string
          description: Regulatory scope marker. Omitted when empty.
        status:
          type: string
          enum: [active, inactive, deprecated]
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AdminAuditDetails:
      type: object
      description: >
        Action-specific structured context. All fields are optional and present
        only when the emitting action populated them. Never carries secret
        material.
      properties:
        bundle_bytes:
          type: integer
        created_count:
          type: integer
        conflict_count:
          type: integer
        unchanged_count:
          type: integer
        error_count:
          type: integer
        from_capability_id:
          type: string
        from_process_id:
          type: string
        to_capability_id:
          type: string
        to_process_id:
          type: string
        surfaces_migrated:
          type: integer
        older_than_days:
          type: integer
        processes_deleted:
          type: array
          items:
            type: string
        capabilities_deleted:
          type: array
          items:
            type: string
        error:
          type: string
          description: Human-readable failure message; never secret.

    AdminAuditEntry:
      type: object
      required: [id, occurred_at, action, outcome, actor_type]
      properties:
        id:
          type: string
        occurred_at:
          type: string
          format: date-time
        action:
          type: string
          enum:
            - apply.invoked
            - password.changed
            - bootstrap.admin_created
        outcome:
          type: string
          enum: [success, failure]
        actor_type:
          type: string
          enum: [user, system]
        actor_id:
          type: string
          description: Principal ID or system identifier. Omitted when unknown.
        target_type:
          type: string
          description: Open-set target kind (e.g. bundle, user, platform, process). Omitted when unset.
        target_id:
          type: string
          description: Resource identifier. Omitted when unset.
        request_id:
          type: string
          description: HTTP request correlation ID. Omitted for non-HTTP events.
        client_ip:
          type: string
          description: Best-effort client IP. Omitted for non-HTTP events.
        required_permission:
          type: string
          description: Authz permission the request was gated on. Omitted for non-permission-gated events.
        details:
          $ref: "#/components/schemas/AdminAuditDetails"

    AdminAuditListResponse:
      type: object
      required: [entries]
      properties:
        entries:
          type: array
          items:
            $ref: "#/components/schemas/AdminAuditEntry"

    SurfaceVersionItem:
      type: object
      description: A single entry in the surface version history list.
      properties:
        version:
          type: integer
        status:
          type: string
          enum: [draft, review, active, deprecated, retired]
        effective_from:
          type: string
          format: date-time
        approved_at:
          type: string
          format: date-time
          nullable: true
        approved_by:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    SurfaceImpact:
      type: object
      description: >
        Full dependency graph for a decision surface — all linked profiles, grants,
        and distinct agents. All array sections are always present (never null).
        Warnings are deterministic based on active-count thresholds.
      properties:
        surface:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            status:
              type: string
            version:
              type: integer
            domain:
              type: string
            business_owner:
              type: string
            technical_owner:
              type: string
            approved_by:
              type: string
            approved_at:
              type: string
              format: date-time
              nullable: true
            deprecation_reason:
              type: string
            successor_surface_id:
              type: string
        profiles:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              status:
                type: string
              version:
                type: integer
              policy_reference:
                type: string
              fail_mode:
                type: string
                enum: [open, closed]
              escalation_mode:
                type: string
                enum: [auto, manual]
        grants:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              agent_id:
                type: string
              profile_id:
                type: string
              status:
                type: string
              granted_by:
                type: string
              effective_from:
                type: string
                format: date-time
              effective_until:
                type: string
                format: date-time
                nullable: true
        agents:
          type: array
          items:
            type: object
            properties:
              id:
                type: string
              name:
                type: string
              type:
                type: string
              owner:
                type: string
              operational_state:
                type: string
                enum: [active, suspended, revoked]
        summary:
          type: object
          properties:
            profile_count:
              type: integer
            grant_count:
              type: integer
            agent_count:
              type: integer
            active_profile_count:
              type: integer
            active_grant_count:
              type: integer
            active_agent_count:
              type: integer
        warnings:
          type: array
          items:
            type: string
          description: Operator warnings. Empty array when none apply.

    SurfaceRecovery:
      type: object
      description: Read-only recovery analysis for a decision surface.
      properties:
        surface_id:
          type: string
        latest_version:
          type: integer
        latest_status:
          type: string
        active_version:
          type: integer
          nullable: true
          description: Null when no version is currently effective.
        active_status:
          type: string
          nullable: true
          description: Null when no version is currently effective.
        successor_surface_id:
          type: string
        deprecation_reason:
          type: string
        version_count:
          type: integer
        warnings:
          type: array
          items:
            type: string
        recommended_next_actions:
          type: array
          items:
            type: string

    ProfileRecovery:
      type: object
      description: Read-only recovery analysis for an authority profile.
      properties:
        profile_id:
          type: string
        surface_id:
          type: string
        latest_version:
          type: integer
        latest_status:
          type: string
        active_version:
          type: integer
          nullable: true
          description: Null when no version is currently effective.
        active_status:
          type: string
          nullable: true
          description: Null when no version is currently effective.
        version_count:
          type: integer
        versions:
          type: array
          items:
            type: object
            properties:
              version:
                type: integer
              status:
                type: string
              effective_from:
                type: string
                format: date-time
        active_grant_count:
          type: integer
          description: >
            Number of active grants linked to this profile.
            -1 when the grant repository is not available.
        capability_note:
          type: string
          description: Human-readable description of the profile lifecycle behaviour.
        warnings:
          type: array
          items:
            type: string
        recommended_next_actions:
          type: array
          items:
            type: string

paths:
  /healthz:
    get:
      operationId: getHealth
      summary: Liveness check
      description: Returns 200 when the server is running. Does not verify store connectivity.
      security: []
      responses:
        "200":
          description: Server is alive
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  service:
                    type: string
                    example: midas
                  policy_mode:
                    type: string
                  policy_evaluator:
                    type: string

  /readyz:
    get:
      operationId: getReadiness
      summary: Readiness check
      description: Returns 200 when the server is ready to serve traffic, including store connectivity.
      security: []
      responses:
        "200":
          description: Ready
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
        "503":
          description: Not ready — store unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/evaluate:
    post:
      operationId: evaluate
      summary: Evaluate a decision request
      description: >
        Evaluates whether an agent is within authority to perform an action on
        a governed decision surface. Produces exactly one outcome and one
        tamper-evident audit envelope. Idempotent by request_id within a source.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EvaluateRequest"
      responses:
        "200":
          description: Evaluation complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvaluateResponse"
        "400":
          description: Invalid request (missing required fields, invalid confidence value, etc.)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated (auth.mode=required and no valid token provided)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.operator or platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: Internal error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/reviews:
    post:
      operationId: createReview
      summary: Resolve an escalated decision
      description: >
        Resolves a pending escalation by approving or rejecting the decision.
        The envelope must be in the awaiting_review state. Transitions the
        envelope to closed.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewRequest"
      responses:
        "200":
          description: Review recorded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ReviewResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin or governance.reviewer)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Envelope not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/envelopes:
    get:
      operationId: listEnvelopes
      summary: List governance envelopes
      description: Returns all envelopes, optionally filtered by lifecycle state.
      parameters:
        - name: state
          in: query
          required: false
          schema:
            type: string
            enum: [received, evaluating, outcome_recorded, escalated, awaiting_review, closed]
          description: Filter by envelope lifecycle state.
      responses:
        "200":
          description: List of envelopes
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Envelope"
        "400":
          description: Invalid state filter
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.viewer or above)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/envelopes/{id}:
    get:
      operationId: getEnvelope
      summary: Get a governance envelope by ID
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Envelope found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "400":
          description: Invalid envelope ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Envelope not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/escalations:
    get:
      operationId: listEscalations
      summary: List pending escalations
      description: >
        Returns all envelopes in the awaiting_review state — the operator's
        pending escalation queue. Use POST /v1/reviews to resolve them.
      responses:
        "200":
          description: List of escalated envelopes awaiting review
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Envelope"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.viewer or above)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/decisions/request/{requestId}:
    get:
      operationId: getDecisionByRequestId
      summary: Look up a decision by request ID
      description: >
        Returns the governance envelope for a given caller-supplied request ID.
        Optionally scoped by source system via the source query parameter.
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
        - name: source
          in: query
          required: false
          schema:
            type: string
          description: Request source system. Scopes the lookup to a specific origin.
      responses:
        "200":
          description: Envelope found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Envelope"
        "400":
          description: Invalid request ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Decision not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/apply:
    post:
      operationId: applyBundle
      summary: Apply a control-plane configuration bundle
      description: >
        Applies a YAML bundle of surface, profile, grant, and agent documents.
        All resources in the bundle are validated before any are persisted.
        Surfaces are created in review state and must be approved separately.
        Requires platform.admin role.
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
              description: Multi-document YAML stream of control-plane resources.
      responses:
        "200":
          description: Bundle applied (may contain per-resource validation errors)
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  created:
                    type: integer
                  updated:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
                      properties:
                        kind:
                          type: string
                        id:
                          type: string
                        field:
                          type: string
                        message:
                          type: string
        "400":
          description: Invalid YAML or bundle-level validation failure
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/plan:
    post:
      operationId: planBundle
      summary: Preview a control-plane bundle without applying it
      description: >
        Validates and plans a YAML bundle, returning the projected changes
        without persisting anything. Useful for CI/CD dry-run workflows.
        Requires platform.admin role.
      requestBody:
        required: true
        content:
          application/yaml:
            schema:
              type: string
      responses:
        "200":
          description: Plan computed
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  planned:
                    type: integer
                  errors:
                    type: array
                    items:
                      type: object
        "400":
          description: Invalid YAML
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/audit:
    get:
      operationId: listControlAudit
      summary: List control-plane audit events
      description: Returns the audit trail of control-plane operations (apply, approve, deprecate).
      responses:
        "200":
          description: Audit event list
          content:
            application/json:
              schema:
                type: array
                items:
                  type: object
                  properties:
                    id:
                      type: string
                    event_type:
                      type: string
                    resource_kind:
                      type: string
                    resource_id:
                      type: string
                    actor:
                      type: string
                    occurred_at:
                      type: string
                      format: date-time
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.viewer or above)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/surfaces/{id}/approve:
    post:
      operationId: approveSurface
      summary: Approve a surface in review state
      description: >
        Transitions a surface from review to active. Enforces maker-checker:
        the approver must not be the same principal who submitted the surface.
        Requires platform.admin or governance.approver role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveSurfaceRequest"
      responses:
        "200":
          description: Surface approved
          content:
            application/json:
              schema:
                type: object
                required: [surface_id, status, approved_by]
                properties:
                  surface_id:
                    type: string
                  status:
                    type: string
                    example: active
                  approved_by:
                    type: string
        "400":
          description: Invalid request or approval policy violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role or approval policy denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Surface not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "409":
          description: Surface is not in review state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/surfaces/{id}/deprecate:
    post:
      operationId: deprecateSurface
      summary: Deprecate an active surface
      description: >
        Transitions a surface from active to deprecated. Deprecated surfaces
        remain usable for existing grants but signal pending migration.
        Requires platform.admin role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeprecateSurfaceRequest"
      responses:
        "200":
          description: Surface deprecated
          content:
            application/json:
              schema:
                type: object
                properties:
                  surface_id:
                    type: string
                  status:
                    type: string
                    example: deprecated
                  deprecation_reason:
                    type: string
                  successor_surface_id:
                    type: string
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Surface not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

