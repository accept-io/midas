  /v1/controlplane/grants/{id}/reinstate:
    post:
      operationId: reinstateGrant
      summary: Reinstate a suspended grant
      description: >
        Reactivates a suspended grant, restoring the agent's authority.
        Only suspended grants can be reinstated; revoked grants cannot.
        Requires platform.admin role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reinstated_by]
              properties:
                reinstated_by:
                  type: string
      responses:
        "200":
          description: Grant reinstated
          content:
            application/json:
              schema:
