  /v1/controlplane/grants/{id}/suspend:
    post:
      operationId: suspendGrant
      summary: Suspend an active grant
      description: >
        Suspends an active authority grant, preventing the associated agent
        from being authorized on the linked profile. Reversible via reinstate.
        Requires platform.admin role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suspended_by]
              properties:
                suspended_by:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Grant suspended
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantLifecycleResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "404":
          description: Grant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /v1/controlplane/grants/{id}/revoke:
    post:
      operationId: revokeGrant
      summary: Revoke a grant permanently
      description: >
        Permanently revokes an authority grant. This is irreversible.
        Requires platform.admin role.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [revoked_by]
              properties:
                revoked_by:
                  type: string
                reason:
                  type: string
      responses:
        "200":
          description: Grant revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantLifecycleResponse"
        "400":
          description: Invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
