  /v1/platform/admin-audit:
    get:
      operationId: listAdminAudit
      summary: List platform-administrative audit events
      description: >
        Returns the append-only platform-administrative audit trail covering
        apply invocations, password changes, and bootstrap admin creation.
        Records are returned in descending occurred_at order (newest first).
        Requires platform.admin role — more restrictive than
        /v1/controlplane/audit because the trail includes password and
        bootstrap events. See Issue #41.
      parameters:
        - name: action
          in: query
          required: false
          schema:
            type: string
            enum:
              - apply.invoked
              - password.changed
              - bootstrap.admin_created
          description: Constrain results to a single action enum value.
        - name: outcome
          in: query
          required: false
          schema:
            type: string
            enum: [success, failure]
          description: Constrain results to success or failure.
        - name: actor_id
          in: query
          required: false
          schema:
            type: string
          description: Constrain results to records emitted for a specific actor.
        - name: target_type
          in: query
          required: false
          schema:
            type: string
          description: Constrain results to a specific target type.
        - name: target_id
          in: query
          required: false
          schema:
            type: string
          description: Constrain results to a specific target ID.
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 500
          description: Cap the number of records returned. Values outside [1, 500] yield 400.
      responses:
        "200":
          description: Admin-audit entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AdminAuditListResponse"
        "400":
          description: Invalid query parameter (e.g. non-positive or out-of-range limit)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: limit must be a positive integer
        "401":
          description: Unauthenticated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "403":
          description: Insufficient role (requires platform.admin)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "501":
          description: Admin-audit not configured
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
              example:
                error: admin-audit not configured
