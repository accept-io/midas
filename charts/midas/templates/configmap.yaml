apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "midas.fullname" . }}
  labels:
    {{- include "midas.labels" . | nindent 4 }}
data:
  midas.yaml: |
    # Generated by Helm. Do not edit directly.
    # Sensitive values (database URL, auth tokens, OIDC client secret) are
    # injected via environment variables from a Secret, not stored here.
    version: 1
    profile: {{ .Values.midas.profile | quote }}

    server:
      port: {{ .Values.midas.server.port }}
      headless: {{ .Values.midas.server.headless }}
      explorer_enabled: {{ .Values.midas.server.explorerEnabled }}
      shutdown_timeout: {{ .Values.midas.server.shutdownTimeout | quote }}

    store:
      backend: {{ .Values.midas.store.backend | quote }}
      # dsn is supplied via MIDAS_DATABASE_URL environment variable

    auth:
      mode: {{ .Values.midas.auth.mode | quote }}
      # tokens are supplied via MIDAS_AUTH_TOKENS environment variable

    local_iam:
      enabled: {{ .Values.midas.localIam.enabled }}
      session_ttl: {{ .Values.midas.localIam.sessionTtl | quote }}
      secure_cookies: {{ .Values.midas.localIam.secureCookies }}

    observability:
      log_level: {{ .Values.midas.observability.logLevel | quote }}
      log_format: {{ .Values.midas.observability.logFormat | quote }}

    control_plane:
      enabled: {{ .Values.midas.controlPlane.enabled }}

    dev:
      seed_demo_data: {{ .Values.midas.dev.seedDemoData }}
      seed_demo_user: {{ .Values.midas.dev.seedDemoUser }}

    dispatcher:
      enabled: {{ .Values.midas.dispatcher.enabled }}
      publisher: {{ .Values.midas.dispatcher.publisher | quote }}
